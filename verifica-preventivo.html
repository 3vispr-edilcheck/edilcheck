<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica Preventivo - EdilCheck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div>
        <h1>EDILCHECK</h1>
        <span>Consulenza edile indipendente nel Veneto</span>
    </div>
    <a href="index.html" class="back-link">← Torna alla home</a>
</header>

<main>
    <div class="card">
        <h2>Verifica il Tuo Preventivo</h2>
        <p>Carica il preventivo che hai ricevuto e i nostri esperti lo analizzeranno entro 48 ore lavorative dalla presa in carico.</p>

        <form id="form-verifica" enctype="multipart/form-data">
            <label for="nome">Nome e Cognome *</label>
            <input type="text" id="nome" name="nome" required placeholder="Mario Rossi">

            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required placeholder="mario@email.com">

            <label for="telefono">Telefono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+39 333 1234567">

            <label for="descrizione">Descrizione del lavoro *</label>
            <textarea id="descrizione" name="descrizione" required placeholder="Descrivi brevemente il lavoro per cui hai ricevuto il preventivo..."></textarea>

            <label for="file">Carica il preventivo (PDF, JPG, PNG) *</label>
            <input type="file" id="file" name="file" accept=".pdf,.jpg,.jpeg,.png" required>

            <div class="privacy-box">
                <label>
                    <input type="checkbox" name="privacy" required>
                    Ho letto e accetto la <a href="privacy.html">Privacy Policy</a>. Acconsento al trattamento dei miei dati personali ai sensi del GDPR (Reg. UE 2016/679).
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:1.5rem; width:100%;">Procedi al Pagamento →</button>
        </form>
    </div>
</main>

<footer>
    &copy; 2025 EdilCheck — Consulenza edile indipendente
</footer>

<script src="script.js"></script>
</body>
</html>
